apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "web-streaming-example.fullname" . }}
  labels:
    {{- include "web-streaming-example.labels" . | nindent 4 }}
data:
  main.json: |
    {
      "auth": {
        "clientId": {{ .Values.config.auth.clientId | toJson }},
        "authority": {{ .Values.config.auth.authority | toJson }},
        "metadataUri": {{ .Values.config.auth.metadataUri | toJson }},
        "redirectUri": {{ .Values.config.auth.redirectUri | toJson }},
        "scope": {{ .Values.config.auth.scope | toJson }}
      },
      "endpoints": {
        "backend": {{ .Values.config.endpoints.backend | toJson }},
        "nucleus": {{ .Values.config.endpoints.nucleus | toJson }}
      },
      "sessions": {
        "maxTtl": {{ .Values.config.sessionTtl | int }},
        "sessionEndNotificationTime": {{ .Values.config.sessionEndNotificationTime | int }},
        "sessionEndNotificationDuration": {{ .Values.config.sessionEndNotificationDuration | int }}
      },
      "userInterface": {
        "title": {{ .Values.config.userInterface.title | toJson }},
        "version": {{ .Chart.Version | toJson }}
      },
      "storageApi": {
        "redirectUri": {{ .Values.config.storageApi.redirectUri | toJson }}
      }
    }

  nginx.conf: |
    pid /tmp/nginx.pid;

    http {
      include /etc/nginx/mime.types;
      disable_symlinks off;

      server {
        listen {{ .Values.service.ports.web }};
        server_name localhost;
        client_max_body_size 32m;
        client_body_buffer_size 128k;
        client_header_buffer_size 5120k;
        large_client_header_buffers 16 5120k;

        root /usr/share/nginx/html;

        location / {
          add_header Strict-Transport-Security max-age=3600;
          add_header Content-Security-Policy {{ .Values.config.csp | quote }};
          try_files $uri /index.html;
        }
      }
    }

    events {}

  settings.toml: |
    root_path = "/api"

    admin_group = {{ .Values.config.auth.adminGroup | toJson }}
    client_id = {{ .Values.config.auth.clientId | toJson }}
    groups_claim = {{ .Values.config.auth.groupsClaim | toJson }}
    jwks_alg = {{ .Values.config.auth.jwksAlg | toJson }}
    jwks_ttl = {{ .Values.config.auth.jwksTtl | int }}
    metadata_uri = {{ .Values.config.auth.metadataUri | toJson }}
    userinfo_ttl = {{ .Values.config.auth.userinfoTtl | int }}
    issuer = {{ .Values.config.auth.issuer | toJson }}

    nvcf_api_key = {{ .Values.nvcf.key | toJson }}
    nvcf_control_endpoint = {{ .Values.nvcf.controlEndpoint | toJson }}
    nvcf_signaling_endpoint = {{ .Values.nvcf.signalingEndpoint | toJson }}
    nvcf_cache_ttl = {{ .Values.nvcf.cacheTtl | int }}
    ngc_endpoint = {{ .Values.nvcf.ngcEndpoint | toJson }}
    ngc_org = {{ .Values.nvcf.ngcOrg | toJson }}

    session_ttl = {{ .Values.config.sessionTtl | int }}
    session_watch_interval = {{ .Values.config.sessionWatchInterval | int }}
    session_idle_timeout = {{ .Values.config.sessionIdleTimeout | int }}
    session_retention_days = {{ .Values.config.sessionRetentionDays | int }}
    max_app_instances_count = {{ .Values.config.maxAppInstancesCount | int }}

    h11_max_incomplete_event_size = {{ .Values.config.h11MaxIncompleteEventSize | int }}

    mcp_enabled = {{ .Values.config.mcp.enabled }}
    mcp_resource_url = {{ .Values.config.mcp.resourceUrl | toJson }}
    mcp_path = {{ .Values.config.mcp.path | toJson }}
    mcp_required_scopes = {{ .Values.config.mcp.requiredScopes | toJson }}
    mcp_callback_path = {{ .Values.config.mcp.callbackPath | toJson }}
    mcp_upstream_client_id = {{ .Values.config.mcp.upstreamClientId | toJson }}
    mcp_upstream_client_secret = {{ .Values.config.mcp.upstreamClientSecret | toJson }}
    mcp_upstream_scopes = {{ .Values.config.mcp.upstreamScopes | toJson }}
